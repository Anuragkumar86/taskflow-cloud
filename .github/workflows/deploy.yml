# File: taskflow-cloud/.github/workflows/deploy.yml
# Trigger: Only when code is pushed/merged to the main branch
# Purpose: Automatically deploy the latest version to EC2

name: CD — Deploy to Production

on:
  push:
    branches: [main]    # Only deploy when code lands on main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 2: Set up builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build and push BOTH images with the latest code
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/taskflow-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/taskflow-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }}:5000

      # Step 4: SSH into EC2 and update the running containers
      # This action SSHes into your server and runs the commands in "script:"
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            echo "🚀 Starting deployment on EC2..."
            
            # Pull the LATEST images from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/taskflow-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend:latest
            
            # Navigate to project directory
            cd /home/ubuntu/taskflow-cloud
            
            # Update the image names in docker-compose.prod.yml
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            
            # Stop current containers (graceful shutdown)
            docker-compose -f docker-compose.prod.yml down --timeout 30
            
            # Start containers with the new images
            docker-compose -f docker-compose.prod.yml up -d
            
            # Wait a moment for containers to start
            sleep 10
            
            # Health check — verify backend is responding
            curl -f http://localhost:5000/health || (echo "❌ Backend health check failed!" && exit 1)
            
            # Clean up old Docker images to save disk space
            docker image prune -f
            
            echo "✅ Deployment successful!"
            echo "Running containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      # Step 5: Post deployment summary
      - name: Deployment Summary
        run: |
          echo "================================================"
          echo "🎉 Deployment Complete!"
          echo "Server: http://${{ secrets.EC2_HOST }}"
          echo "Frontend: http://${{ secrets.EC2_HOST }}:3000"
          echo "Backend API: http://${{ secrets.EC2_HOST }}:5000"
          echo "Commit: ${{ github.sha }}"
          echo "================================================"