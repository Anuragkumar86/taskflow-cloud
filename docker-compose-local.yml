services:
  postgres:
    image: postgres:16
    container_name: taskflow-postgres
    restart: always
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow_user
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: taskflow-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    image: node:22
    container_name: taskflow-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    command: ["sh", "-c", "npm install --no-audit --no-fund --silent && npm run dev"]

volumes:
  postgres_local_data: