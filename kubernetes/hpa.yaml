# File: taskflow-cloud/kubernetes/hpa.yaml
# HPA = Horizontal Pod Autoscaler
# Automatically adds pods when CPU is high, removes when CPU drops
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: taskflow-backend-hpa
  namespace: taskflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: taskflow-backend
  minReplicas: 2    # Always keep at least 2 pods running
  maxReplicas: 6    # Never exceed 6 pods
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70   # Scale up when CPU > 70%
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80   # Scale up when memory > 80%