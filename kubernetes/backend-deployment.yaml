# File: taskflow-cloud/kubernetes/backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-backend
  namespace: taskflow
  labels:
    app: taskflow-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskflow-backend
  # RollingUpdate: deploys new version without stopping old one
  # maxSurge=1: create 1 extra pod during update
  # maxUnavailable=0: never have less than desired replicas
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: taskflow-backend
    spec:
      containers:
      - name: backend
        # Replace with your Docker Hub image
        image: anurag8651/taskflow-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: taskflow-secrets
              key: db-host
        - name: DB_PORT
          value: "5432"
        - name: DB_SSL
          value: "true"
        - name: DB_NAME
          value: "taskflow"
        - name: DB_USER
          value: "askflow_user"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taskflow-secrets
              key: db-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: taskflow-secrets
              key: jwt-secret
        - name: REDIS_URL
          value: "redis://taskflow-redis:6379"
        - name: AWS_REGION
          value: "ap-south-1"
        - name: AWS_S3_BUCKET_NAME
          valueFrom:
            secretKeyRef:
              name: taskflow-secrets
              key: s3-bucket
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # Liveness probe: K8s restarts pod if /health returns error
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        # Readiness probe: K8s only sends traffic when pod is ready
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow-backend
  namespace: taskflow
spec:
  selector:
    app: taskflow-backend
  ports:
  - port: 5000
    targetPort: 5000
  # ClusterIP = internal service — only accessible inside the cluster
  type: ClusterIP